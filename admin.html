<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>管理面板 | Jitaimei Go</title>
    <style>
        /* 全局变量 & 深色模式 */
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --input-bg: #ffffff;
            --nav-bg: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --accent: #3b82f6;
                --accent-hover: #2563eb;
                --danger: #ef4444;
                --danger-hover: #dc2626;
                --input-bg: #0f172a;
                --nav-bg: #1e293b;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* 左侧导航 */
        .sidebar {
            width: 220px;
            background: var(--nav-bg);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 1.3rem;
            font-weight: 600;
            padding: 0 20px 24px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
        }
        .sidebar-title:hover {
            text-decoration: underline;
        }
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.15s;
            border-left: 3px solid transparent;
            margin: 2px 0;
        }
        .nav-item:hover {
            background: var(--border);
            color: var(--text-primary);
        }
        .nav-item.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(37,99,235,0.05);
        }
        .nav-item.hidden {
            display: none;
        }

        /* 右侧主内容 */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            min-width: 0;
        }

        /* 卡片样式 */
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th {
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            position: sticky;
            top: 0;
            background-color: var(--surface);
            z-index: 1;
        }
        td {
            word-break: break-word;
        }
        .link-cell {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .link-cell a {
            color: var(--accent);
            text-decoration: none;
        }
        .link-cell a:hover {
            text-decoration: underline;
        }
        .action-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .action-btn:hover { background: var(--danger-hover); }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            font-size: 0.95rem;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--border);
            color: var(--text-primary);
            border: 1px solid transparent;
        }
        .btn-secondary:hover { background: var(--text-secondary); color: white; }

        /* 分页 */
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        .page-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            cursor: pointer;
        }
        .page-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .page-btn:disabled { opacity: 0.5; cursor: default; }

        /* Token 输入页面 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }
        .login-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 { margin-bottom: 24px; }
        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }

        /* 错误提示 */
        .error-toast {
            background: #f87171;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        /* 边距工具 */
        .hidden { display: none !important; }
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 16px; }

        /* 移动端适配 */
        @media (max-width: 700px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-title { padding: 0 16px 0 0; font-size: 1.2rem; }
            .nav-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
            .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
        }
    </style>
</head>
<body>

    <!-- Token 验证界面（初始显示） -->
    <div id="loginSection" class="login-container">
        <div class="login-card">
            <h2>管理面板</h2>
            <div id="loginError" class="error-toast"></div>
            <input type="password" id="tokenInput" class="login-input" placeholder="请输入管理员 Token" autocomplete="off">
            <button id="loginBtn" class="btn btn-primary" style="width:100%;">验证并进入</button>
        </div>
    </div>

    <!-- 管理主界面 -->
    <div id="adminSection" class="hidden" style="display: flex; width: 100%; min-height: 100vh;">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <a class="sidebar-title" href="/">Jitaimei Go</a>
            <div class="nav-item active" data-page="overview">概览</div>
            <div class="nav-item" data-page="links">普通短链</div>
            <div class="nav-item hidden" id="navSuperLinks" data-page="superLinks">超级短链</div>
            <div class="nav-item" data-page="blacklist">域名黑名单</div>
        </div>

        <!-- 右侧内容区 -->
        <div class="main-content">
            <!-- 概览页 -->
            <div id="pageOverview" class="page">
                <div class="card">
                    <div class="card-title">概览统计</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="statLinks">0</div>
                            <div class="stat-label">短链接总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="statBlacklist">0</div>
                            <div class="stat-label">黑名单域名数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="statTotalViews">0</div>
                            <div class="stat-label">累计跳转</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 普通短链页 -->
            <div id="pageLinks" class="page hidden">
                <div class="card">
                    <div class="card-title">普通短链管理</div>
                    <div class="toolbar">
                        <input type="text" id="linkSearch" class="search-input" placeholder="搜索 ID 或原链接...">
                    </div>
                    <div id="linksTableContainer" style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>ID</th>
                                    <th>原链接</th>
                                    <th>过期时间</th>
                                    <th>创建时间</th>
                                    <th>IP</th>
                                    <th>浏览</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="linksTbody"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="linksPagination"></div>
                </div>
            </div>

            <!-- 超级短链页 -->
            <div id="pageSuperLinks" class="page hidden">
                <div class="card">
                    <div class="card-title">超级短链管理</div>
                    <div class="toolbar">
                        <input type="text" id="superLinkSearch" class="search-input" placeholder="搜索 ID 或原链接...">
                    </div>
                    <div id="superLinksTableContainer" style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>ID</th>
                                    <th>原链接</th>
                                    <th>过期时间</th>
                                    <th>创建时间</th>
                                    <th>IP</th>
                                    <th>浏览</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="superLinksTbody"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="superLinksPagination"></div>
                </div>
            </div>

            <!-- 域名黑名单页 -->
            <div id="pageBlacklist" class="page hidden">
                <div class="card">
                    <div class="card-title">域名黑名单</div>
                    <div class="toolbar">
                        <input type="text" id="blacklistSearch" class="search-input" placeholder="搜索域名...">
                        <button class="btn btn-primary" id="btnAddBlacklist">+ 添加域名</button>
                    </div>
                    <div id="blacklistTableContainer" style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr><th>序号</th><th>域名</th><th>操作</th></tr>
                            </thead>
                            <tbody id="blacklistTbody"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="blacklistPagination"></div>
                    <div class="mt-3" style="text-align: right;">
                        <button class="btn btn-primary" id="btnSaveBlacklist">✓ 保存黑名单</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            var params = new URLSearchParams(window.location.search);
            var tokenInUrl = params.get('token') || '';

            var BASE_URL = window.location.origin;

            var loginSection = document.getElementById('loginSection');
            var adminSection = document.getElementById('adminSection');
            var tokenInput = document.getElementById('tokenInput');
            var loginBtn = document.getElementById('loginBtn');
            var loginError = document.getElementById('loginError');

            var navItems = document.querySelectorAll('.nav-item');
            var navSuperLinks = document.getElementById('navSuperLinks');
            var pages = {
                overview: document.getElementById('pageOverview'),
                links: document.getElementById('pageLinks'),
                superLinks: document.getElementById('pageSuperLinks'),
                blacklist: document.getElementById('pageBlacklist')
            };

            var statLinks = document.getElementById('statLinks');
            var statBlacklist = document.getElementById('statBlacklist');
            var statTotalViews = document.getElementById('statTotalViews');

            var linkSearch = document.getElementById('linkSearch');
            var linksTbody = document.getElementById('linksTbody');
            var linksPagination = document.getElementById('linksPagination');

            var superLinkSearch = document.getElementById('superLinkSearch');
            var superLinksTbody = document.getElementById('superLinksTbody');
            var superLinksPagination = document.getElementById('superLinksPagination');

            var blacklistSearch = document.getElementById('blacklistSearch');
            var blacklistTbody = document.getElementById('blacklistTbody');
            var blacklistPagination = document.getElementById('blacklistPagination');
            var btnAddBlacklist = document.getElementById('btnAddBlacklist');
            var btnSaveBlacklist = document.getElementById('btnSaveBlacklist');

            var currentPage = 'overview';
            var allLinks = [];
            var allSuperLinks = [];
            var originalBlacklist = [];
            var editedBlacklist = [];
            var ipCache = {};
            var superIpCache = {};
            var ITEMS_PER_PAGE = 50;
            var enableSuperLink = false;

            // ---------- 辅助函数 ----------
            function showError(element, message) {
                element.style.display = 'block';
                element.textContent = message;
                setTimeout(function() { element.style.display = 'none'; }, 4000);
            }

            function apiRequest(url, callback) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.timeout = 10000;
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var resp = JSON.parse(xhr.responseText);
                                callback(null, resp);
                            } catch(e) {
                                callback('JSON解析错误');
                            }
                        } else {
                            callback('HTTP错误 ' + xhr.status);
                        }
                    }
                };
                xhr.onerror = function() { callback('网络错误'); };
                xhr.ontimeout = function() { callback('请求超时'); };
                xhr.send();
            }

            function verifyToken(token, callback) {
                apiRequest(BASE_URL + '/api/v1/admin_login?token=' + encodeURIComponent(token), function(err, resp) {
                    if (err) { callback(false); return; }
                    callback(resp && resp.code === 200);
                });
            }

            function fetchIpInfo(ip, callback) {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://v2.xxapi.cn/api/ip?ip=' + encodeURIComponent(ip), true);
                xhr.timeout = 5000;
                xhr.onload = function() {
                    if (xhr.status === 200) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            if (resp.code === 200 && resp.data) {
                                callback(null, resp.data.address || '未知');
                            } else {
                                callback(null, '未知');
                            }
                        } catch(e) {
                            callback(null, '未知');
                        }
                    } else {
                        callback(null, '未知');
                    }
                };
                xhr.onerror = function() { callback(null, '未知'); };
                xhr.ontimeout = function() { callback(null, '未知'); };
                xhr.send();
            }

            function sleep(ms) {
                return new Promise(function(resolve) { setTimeout(resolve, ms); });
            }

            async function queryAllIps(uniqueIps, delayMs) {
                var cache = {};
                for (var ip of uniqueIps) {
                    if (!ip || ip === '未知') {
                        cache[ip] = '未知';
                        continue;
                    }
                    await sleep(delayMs || 30);
                    var address = await new Promise(function(resolve) {
                        fetchIpInfo(ip, function(err, addr) { resolve(addr); });
                    });
                    cache[ip] = address;
                }
                return cache;
            }

            // 文本内容转义
            function escapeHtml(text) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(text));
                return div.innerHTML;
            }

            // 属性值转义，防XSS注入
            function escapeAttr(text) {
                return String(text).replace(/&/g, '&amp;')
                                  .replace(/"/g, '&quot;')
                                  .replace(/</g, '&lt;')
                                  .replace(/>/g, '&gt;');
            }

            // ---------- 数据加载 ----------
            function loadAllData(callback) {
                var loaded = 0;
                var linksData = [];
                var superLinksData = [];
                var blacklistData = [];

                function checkDone() {
                    loaded++;
                    if (loaded === 3) {
                        allLinks = linksData;
                        allSuperLinks = superLinksData;
                        originalBlacklist = blacklistData;
                        editedBlacklist = blacklistData.slice();

                        var uniqueIps = [];
                        var ipSet = {};
                        allLinks.forEach(function(item) {
                            var ip = item.ip;
                            if (ip && ip !== '未知' && !ipSet[ip]) {
                                ipSet[ip] = true;
                                uniqueIps.push(ip);
                            }
                        });
                        allSuperLinks.forEach(function(item) {
                            var ip = item.ip;
                            if (ip && ip !== '未知' && !ipSet[ip]) {
                                ipSet[ip] = true;
                                uniqueIps.push(ip);
                            }
                        });

                        if (uniqueIps.length > 0) {
                            queryAllIps(uniqueIps, 30).then(function(cache) {
                                ipCache = cache;
                                superIpCache = cache;
                                callback();
                            });
                        } else {
                            ipCache = {};
                            superIpCache = {};
                            callback();
                        }
                    }
                }

                apiRequest(BASE_URL + '/api/v1/admin_data?token=' + encodeURIComponent(tokenInUrl), function(err, resp) {
                    if (err || !resp || resp.code !== 200) {
                        linksData = [];
                    } else {
                        var data = resp.data || {};
                        linksData = Object.keys(data).map(function(id) {
                            var item = data[id];
                            return {
                                id: id,
                                link: item.link || '',
                                deadlinedate: item.deadlinedate || '-1',
                                ip: item.ip || '未知',
                                createtime: item.createtime || '',
                                view: item.view || 0
                            };
                        });
                    }
                    checkDone();
                });

                if (enableSuperLink) {
                    apiRequest(BASE_URL + '/api/v1/admin_data_super?token=' + encodeURIComponent(tokenInUrl), function(err, resp) {
                        if (err || !resp || resp.code !== 200) {
                            superLinksData = [];
                        } else {
                            var data = resp.data || {};
                            superLinksData = Object.keys(data).map(function(id) {
                                var item = data[id];
                                return {
                                    id: id,
                                    link: item.link || '',
                                    deadlinedate: item.deadlinedate || '-1',
                                    ip: item.ip || '未知',
                                    createtime: item.createtime || '',
                                    view: item.view || 0
                                };
                            });
                        }
                        checkDone();
                    });
                } else {
                    superLinksData = [];
                    checkDone();
                }

                apiRequest(BASE_URL + '/api/v1/admin_blacklist_domain_show?token=' + encodeURIComponent(tokenInUrl), function(err, resp) {
                    if (err || !resp || resp.code !== 200) {
                        blacklistData = [];
                    } else {
                        blacklistData = resp.blacklist_domain || [];
                    }
                    checkDone();
                });
            }

            // ---------- 导航切换 ----------
            function switchPage(pageName) {
                currentPage = pageName;
                Object.keys(pages).forEach(function(key) {
                    pages[key].classList.add('hidden');
                });
                pages[pageName].classList.remove('hidden');

                navItems.forEach(function(item) {
                    var p = item.getAttribute('data-page');
                    if (p === pageName) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                if (pageName === 'overview') {
                    renderOverview();
                } else if (pageName === 'links') {
                    renderLinksTable();
                } else if (pageName === 'superLinks') {
                    renderSuperLinksTable();
                } else if (pageName === 'blacklist') {
                    renderBlacklistTable();
                }
            }

            function renderOverview() {
                var totalLinks = allLinks.length + allSuperLinks.length;
                statLinks.textContent = totalLinks;
                statBlacklist.textContent = originalBlacklist.length;
                var totalViews = 0;
                allLinks.forEach(function(item) { totalViews += item.view; });
                allSuperLinks.forEach(function(item) { totalViews += item.view; });
                statTotalViews.textContent = totalViews;
            }

            function paginate(items, searchTerm, searchKeys) {
                if (searchTerm) {
                    var lowerSearch = searchTerm.toLowerCase();
                    items = items.filter(function(item) {
                        return searchKeys.some(function(key) {
                            var value = (item[key] || '').toString().toLowerCase();
                            return value.indexOf(lowerSearch) !== -1;
                        });
                    });
                }
                return items;
            }

            function renderPagination(totalItems, currentPageNum, container, onPageChange) {
                var totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
                container.innerHTML = '';
                if (totalPages <= 1) return;
                var startPage = Math.max(1, currentPageNum - 2);
                var endPage = Math.min(totalPages, currentPageNum + 2);
                for (var i = startPage; i <= endPage; i++) {
                    var btn = document.createElement('button');
                    btn.className = 'page-btn' + (i === currentPageNum ? ' active' : '');
                    btn.textContent = i;
                    btn.onclick = (function(page) {
                        return function() { onPageChange(page); };
                    })(i);
                    container.appendChild(btn);
                }
            }

            // ---------- 普通短链表格 ----------
            var linksCurrentPage = 1;
            function renderLinksTable(page) {
                if (!page) page = linksCurrentPage;
                linksCurrentPage = page;
                var searchTerm = linkSearch.value.trim();
                var filtered = paginate(allLinks, searchTerm, ['id', 'link']);
                var start = (page - 1) * ITEMS_PER_PAGE;
                var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

                linksTbody.innerHTML = '';
                if (pageItems.length === 0) {
                    linksTbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">暂无数据</td></tr>';
                } else {
                    pageItems.forEach(function(item, index) {
                        var row = document.createElement('tr');
                        var globalIndex = start + index + 1;
                        var deadlineDisplay = item.deadlinedate === '-1' ? '永久有效' : item.deadlinedate;
                        var createtimeDisplay = item.createtime || '-';
                        var ip = item.ip || '未知';
                        var address = ipCache[ip] || '未知';
                        var ipDisplay = ip;
                        if (address !== '未知') ipDisplay += ' (' + address + ')';
                        row.innerHTML =
                            '<td>' + globalIndex + '</td>' +
                            '<td><strong>' + escapeHtml(item.id) + '</strong></td>' +
                            '<td class="link-cell"><a href="' + escapeAttr(item.link) + '" target="_blank" rel="noopener noreferrer" title="' + escapeAttr(item.link) + '">' + escapeHtml(item.link) + '</a></td>' +
                            '<td>' + escapeHtml(deadlineDisplay) + '</td>' +
                            '<td>' + escapeHtml(createtimeDisplay) + '</td>' +
                            '<td>' + escapeHtml(ipDisplay) + '</td>' +
                            '<td>' + (item.view || 0) + '</td>' +
                            '<td><button class="action-btn delete-link-btn" data-id="' + escapeAttr(item.id) + '">删除</button></td>';
                        linksTbody.appendChild(row);
                    });
                }

                document.querySelectorAll('.delete-link-btn').forEach(function(btn) {
                    btn.onclick = function() {
                        var id = this.getAttribute('data-id');
                        if (confirm('确定删除普通短链 ' + id + ' 吗？')) {
                            deleteLink(id, 'normal');
                        }
                    };
                });

                renderPagination(filtered.length, page, linksPagination, function(newPage) {
                    renderLinksTable(newPage);
                });
            }

            // ---------- 超级短链表格 ----------
            var superLinksCurrentPage = 1;
            function renderSuperLinksTable(page) {
                if (!page) page = superLinksCurrentPage;
                superLinksCurrentPage = page;
                var searchTerm = superLinkSearch.value.trim();
                var filtered = paginate(allSuperLinks, searchTerm, ['id', 'link']);
                var start = (page - 1) * ITEMS_PER_PAGE;
                var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

                superLinksTbody.innerHTML = '';
                if (pageItems.length === 0) {
                    superLinksTbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">暂无数据</td></tr>';
                } else {
                    pageItems.forEach(function(item, index) {
                        var row = document.createElement('tr');
                        var globalIndex = start + index + 1;
                        var deadlineDisplay = item.deadlinedate === '-1' ? '永久有效' : item.deadlinedate;
                        var createtimeDisplay = item.createtime || '-';
                        var ip = item.ip || '未知';
                        var address = superIpCache[ip] || '未知';
                        var ipDisplay = ip;
                        if (address !== '未知') ipDisplay += ' (' + address + ')';
                        // 安全转义
                        row.innerHTML =
                            '<td>' + globalIndex + '</td>' +
                            '<td><strong>' + escapeHtml(item.id) + '</strong></td>' +
                            '<td class="link-cell"><a href="' + escapeAttr(item.link) + '" target="_blank" rel="noopener noreferrer" title="' + escapeAttr(item.link) + '">' + escapeHtml(item.link) + '</a></td>' +
                            '<td>' + escapeHtml(deadlineDisplay) + '</td>' +
                            '<td>' + escapeHtml(createtimeDisplay) + '</td>' +
                            '<td>' + escapeHtml(ipDisplay) + '</td>' +
                            '<td>' + (item.view || 0) + '</td>' +
                            '<td><button class="action-btn delete-super-link-btn" data-id="' + escapeAttr(item.id) + '">删除</button></td>';
                        superLinksTbody.appendChild(row);
                    });
                }

                document.querySelectorAll('.delete-super-link-btn').forEach(function(btn) {
                    btn.onclick = function() {
                        var id = this.getAttribute('data-id');
                        if (confirm('确定删除超级短链 ' + id + ' 吗？')) {
                            deleteLink(id, 'super');
                        }
                    };
                });

                renderPagination(filtered.length, page, superLinksPagination, function(newPage) {
                    renderSuperLinksTable(newPage);
                });
            }

            function deleteLink(id, type) {
                var url;
                if (type === 'normal') {
                    url = BASE_URL + '/api/v1/admin_del?id=' + encodeURIComponent(id) + '&token=' + encodeURIComponent(tokenInUrl);
                } else {
                    url = BASE_URL + '/api/v1/admin_del_super?id=' + encodeURIComponent(id) + '&token=' + encodeURIComponent(tokenInUrl);
                }
                apiRequest(url, function(err, resp) {
                    if (err || !resp || resp.code !== 200) {
                        alert('删除失败');
                        return;
                    }
                    if (type === 'normal') {
                        allLinks = allLinks.filter(function(item) { return item.id !== id; });
                        renderLinksTable(linksCurrentPage);
                    } else {
                        allSuperLinks = allSuperLinks.filter(function(item) { return item.id !== id; });
                        renderSuperLinksTable(superLinksCurrentPage);
                    }
                    if (currentPage === 'overview') renderOverview();
                });
            }

            var blacklistCurrentPage = 1;
            function renderBlacklistTable(page) {
                if (!page) page = blacklistCurrentPage;
                blacklistCurrentPage = page;
                var searchTerm = blacklistSearch.value.trim();
                var filtered = paginate(editedBlacklist, searchTerm, ['domain']);
                var start = (page - 1) * ITEMS_PER_PAGE;
                var pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);
                blacklistTbody.innerHTML = '';
                if (pageItems.length === 0) {
                    blacklistTbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">暂无数据</td></tr>';
                } else {
                    pageItems.forEach(function(domain, index) {
                        var row = document.createElement('tr');
                        var globalIndex = start + index + 1;
                        row.innerHTML =
                            '<td>' + globalIndex + '</td>' +
                            '<td>' + escapeHtml(domain) + '</td>' +
                            '<td><button class="action-btn delete-domain-btn" data-domain="' + escapeAttr(domain) + '">删除</button></td>';
                        blacklistTbody.appendChild(row);
                    });
                }
                document.querySelectorAll('.delete-domain-btn').forEach(function(btn) {
                    btn.onclick = function() {
                        var domain = this.getAttribute('data-domain');
                        if (confirm('确定从黑名单移除 ' + domain + ' 吗？')) {
                            editedBlacklist = editedBlacklist.filter(function(d) { return d !== domain; });
                            renderBlacklistTable(blacklistCurrentPage);
                        }
                    };
                });
                renderPagination(filtered.length, page, blacklistPagination, function(newPage) {
                    renderBlacklistTable(newPage);
                });
            }
            function addBlacklistDomain() {
                var newDomain = prompt('请输入要添加的域名（支持通配符，如 *.example.com）：');
                if (!newDomain) return;
                newDomain = newDomain.trim();
                if (!newDomain) return;
                if (editedBlacklist.indexOf(newDomain) !== -1) {
                    alert('该域名已存在');
                    return;
                }
                editedBlacklist.push(newDomain);
                renderBlacklistTable(blacklistCurrentPage);
            }
            function saveBlacklist() {
                var newJson = JSON.stringify(editedBlacklist);
                var url = BASE_URL + '/api/v1/admin_blacklist_domain_change?new=' + encodeURIComponent(newJson) + '&token=' + encodeURIComponent(tokenInUrl);
                apiRequest(url, function(err, resp) {
                    if (err || !resp || resp.code !== 200) {
                        alert('保存失败: ' + (err || 'token错误或格式异常'));
                        return;
                    }
                    originalBlacklist = editedBlacklist.slice();
                    alert('黑名单保存成功！');
                    if (currentPage === 'overview') renderOverview();
                });
            }

            function initAdmin() {
                apiRequest(BASE_URL + '/api/v1/enable_super_link', function(err, resp) {
                    if (!err && resp && resp.code === 200) {
                        enableSuperLink = resp.enable === true;
                    } else {
                        enableSuperLink = false;
                    }
                    if (enableSuperLink) {
                        navSuperLinks.classList.remove('hidden');
                    } else {
                        navSuperLinks.classList.add('hidden');
                    }

                    loginSection.style.display = 'none';
                    adminSection.classList.remove('hidden');
                    adminSection.style.display = 'flex';

                    loadAllData(function() {
                        switchPage('overview');
                    });
                });
            }

            if (tokenInUrl) {
                verifyToken(tokenInUrl, function(valid) {
                    if (valid) {
                        initAdmin();
                    } else {
                        window.location.replace(BASE_URL + '/admin');
                    }
                });
            } else {
                loginSection.style.display = 'flex';
                adminSection.classList.add('hidden');
                adminSection.style.display = 'none';
                loginBtn.onclick = function() {
                    var token = tokenInput.value.trim();
                    if (!token) {
                        showError(loginError, '请输入Token');
                        return;
                    }
                    loginBtn.disabled = true;
                    loginBtn.textContent = '验证中…';
                    verifyToken(token, function(valid) {
                        loginBtn.disabled = false;
                        loginBtn.textContent = '验证并进入';
                        if (valid) {
                            window.location.replace(BASE_URL + '/admin?token=' + encodeURIComponent(token));
                        } else {
                            showError(loginError, 'Token验证失败');
                        }
                    });
                };
                tokenInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') loginBtn.click();
                });
            }

            navItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    var page = this.getAttribute('data-page');
                    switchPage(page);
                });
            });
            linkSearch.addEventListener('input', function() {
                linksCurrentPage = 1;
                renderLinksTable(1);
            });
            superLinkSearch.addEventListener('input', function() {
                superLinksCurrentPage = 1;
                renderSuperLinksTable(1);
            });
            blacklistSearch.addEventListener('input', function() {
                blacklistCurrentPage = 1;
                renderBlacklistTable(1);
            });
            btnAddBlacklist.addEventListener('click', addBlacklistDomain);
            btnSaveBlacklist.addEventListener('click', saveBlacklist);
        })();
    </script>
</body>
</html>
